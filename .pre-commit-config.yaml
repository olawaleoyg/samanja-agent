# Local git-hook checks — install once with:
#   pip install pre-commit
#   pre-commit install --hook-type pre-commit --hook-type pre-push
#
# What runs when:
#   pre-commit  (on `git commit`): formatting + lint, auto-fixes what it can
#   pre-push    (on `git push`):   full test suite — blocks the push on failure

repos:
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: [--fix]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pytest
        name: Run test suite before push
        entry: pytest -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
